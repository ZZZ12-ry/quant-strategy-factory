# 量化策略工厂 - 配置文件

# ==================== 账户配置 ====================
[account]
initial_capital = 1000000    # 初始资金
commission_rate = 0.0003     # 手续费率（万三）
slippage = 0.001             # 滑点（千一）
margin_ratio = 0.10          # 保证金比例（10%）

# ==================== 风控配置 ====================
[risk]
max_single_position = 0.30   # 单策略最大仓位 30%
max_total_position = 0.80    # 总仓位最大 80%
min_cash_ratio = 0.20        # 最小现金比例 20%

max_daily_loss = 0.05        # 单日最大亏损 5%
max_weekly_loss = 0.10       # 单周最大亏损 10%
max_monthly_loss = 0.15      # 单月最大亏损 15%
max_drawdown = 0.20          # 最大回撤 20%
stop_loss_per_trade = 0.03   # 单笔止损 3%

# ==================== 回测配置 ====================
[backtest]
start_date = 20200101        # 回测开始日期
end_date = 20241231          # 回测结束日期
initial_capital = 1000000    # 回测初始资金
commission = 0.0003          # 手续费
slippage = 0.001             # 滑点
impact_cost = 0.0005         # 冲击成本

# ==================== 样本外验证配置 ====================
[validation]
train_ratio = 0.60           # 训练集比例 60%
validation_ratio = 0.20      # 验证集比例 20%
test_ratio = 0.20            # 测试集比例 20%
walk_forward_window = 252    # 滚动窗口（1 年交易日）
walk_forward_step = 63       # 滚动步长（1 季度）

# ==================== 数据配置 ====================
[data]
data_source = akshare        # 数据源：akshare/tushare/rqdata
cache_dir = data/cache       # 缓存目录
cache_max_age = 7            # 缓存最大天数
auto_update = true           # 自动更新缓存

# ==================== 品种配置 ====================
[symbols]
# 商品期货
commodities = [
    "RB2405",  # 螺纹钢
    "HC2405",  # 热卷
    "CU2405",  # 沪铜
    "AL2405",  # 沪铝
    "AU2412",  # 黄金
    "AG2412",  # 白银
    "ZN2405",  # 沪锌
    "PB2405",  # 沪铅
    "NI2405",  # 沪镍
    "SN2405",  # 沪锡
]

# 农产品
agriculture = [
    "M2405",   # 豆粕
    "Y2405",   # 豆油
    "P2405",   # 棕榈油
    "C2405",   # 玉米
    "CS2405",  # 淀粉
]

# 化工
chemicals = [
    "TA2405",  # PTA
    "MA2405",  # 甲醇
    "FG2405",  # 玻璃
    "SA2405",  # 纯碱
]

# ==================== 策略配置 ====================
[strategy]
# 启用的策略
enabled_strategies = [
    "multifactor_v2",
    "volume_night_day",
    "pairs_trading",
]

# 策略参数
[strategy.multifactor_v2]
lookback_period = 20
rebalance_period = 5
top_percentile = 0.3

[strategy.volume_night_day]
volume_ma_period = 20
volume_zscore_threshold = 1.5
stop_loss_pct = 0.02
take_profit_pct = 0.04

[strategy.pairs_trading]
lookback_period = 60
entry_zscore = 2.0
exit_zscore = 0.5

# ==================== 日志配置 ====================
[logging]
level = INFO             # 日志级别：DEBUG/INFO/WARNING/ERROR
log_dir = logs           # 日志目录
save_to_file = true      # 是否保存到文件
console_output = true    # 是否输出到控制台

# ==================== 报告配置 ====================
[report]
output_dir = reports         # 报告输出目录
format = html                # 报告格式：html/pdf/json
include_charts = true        # 是否包含图表
auto_open = true             # 是否自动打开报告
